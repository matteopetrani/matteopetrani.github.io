name: Send email on new post

on:
  push:
    branches:
      - main
    paths:
      - "it/_posts/**"
      - "en/_posts/**"

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send emails for new posts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_SEGMENT_ID_IT: ${{ secrets.RESEND_SEGMENT_ID_IT }}
          RESEND_SEGMENT_ID_EN: ${{ secrets.RESEND_SEGMENT_ID_EN }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          chmod +x scripts/send-post-email.sh
          bash scripts/send-post-email.sh
