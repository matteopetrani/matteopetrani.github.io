name: Send email on new post

on:
  push:
    branches:
      - main
    paths:
      - "it/_posts/**"
      - "en/_posts/**"

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send emails for new posts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_SEGMENT_ID_IT: ${{ secrets.RESEND_SEGMENT_ID_IT }}
          RESEND_SEGMENT_ID_EN: ${{ secrets.RESEND_SEGMENT_ID_EN }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
        run: |
          set -e

          # ── helpers ──────────────────────────────────────────────────────────

          base64url() {
            printf '%s' "$1" | base64 | tr '+/' '-_' | tr -d '='
          }

          make_unsub_token() {
            local email="$1" lang="$2"
            local payload
            payload=$(base64url "${email}|${lang}|0")
            local sig
            sig=$(printf '%s' "${payload}" \
              | openssl dgst -sha256 -hmac "${HMAC_SECRET}" -binary \
              | base64 | tr '+/' '-_' | tr -d '=')
            printf '%s.%s' "${payload}" "${sig}"
          }

          html_escape() {
            printf '%s' "$1" \
              | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g'
          }

          # ── detect new posts ─────────────────────────────────────────────────

          BEFORE_SHA="${{ github.event.before }}"
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            DIFF_OUTPUT=$(git diff --name-status "$BEFORE_SHA" "${GITHUB_SHA}")
          else
            DIFF_OUTPUT=$(git show --name-status --pretty="" "${GITHUB_SHA}")
          fi

          CHANGED_POSTS=$(printf '%s\n' "$DIFF_OUTPUT" \
            | awk '$1 == "A" { print $2 }' \
            | grep -E '^(it|en)/_posts/' || true)

          if [ -z "$CHANGED_POSTS" ]; then
            echo "No new posts found."
            exit 0
          fi

          # ── process each new post ────────────────────────────────────────────

          for FILE in $CHANGED_POSTS; do
            [ -f "$FILE" ] || continue

            # Language from path prefix
            LANG=$(printf '%s' "$FILE" | cut -d'/' -f1)
            [ "$LANG" = "it" ] || [ "$LANG" = "en" ] || continue

            # Segment ID
            if [ "$LANG" = "it" ]; then
              SEGMENT_ID="${RESEND_SEGMENT_ID_IT}"
            else
              SEGMENT_ID="${RESEND_SEGMENT_ID_EN}"
            fi

            # Frontmatter fields
            TITLE=$(awk '/^title:/ { sub(/^title:[ "]*/, ""); sub(/"[ ]*$/, ""); print; exit }' "$FILE")
            [ -z "$TITLE" ] && TITLE="Nuovo post"

            EXCERPT=$(awk '/^excerpt:/ { sub(/^excerpt:[ "]*/, ""); sub(/"[ ]*$/, ""); print; exit }' "$FILE")

            # Post URL from filename
            BASENAME=$(basename "$FILE" .md)
            YEAR=$(printf '%s' "$BASENAME" | cut -d'-' -f1)
            MONTH=$(printf '%s' "$BASENAME" | cut -d'-' -f2)
            DAY=$(printf '%s' "$BASENAME" | cut -d'-' -f3)
            SLUG=$(printf '%s' "$BASENAME" | cut -d'-' -f4-)
            POST_URL="${SITE_BASE_URL%/}/${YEAR}/${MONTH}/${DAY}/${SLUG}/"

            TITLE_ESC=$(html_escape "$TITLE")
            EXCERPT_ESC=$(html_escape "$EXCERPT")

            if [ "$LANG" = "it" ]; then
              READ_LABEL="Leggi il post"
              UNSUB_LABEL="Disiscriviti"
            else
              READ_LABEL="Read the post"
              UNSUB_LABEL="Unsubscribe"
            fi

            echo "Processing: $FILE (lang=$LANG)"

            # ── fetch subscribers ────────────────────────────────────────────

            CONTACTS_JSON=$(curl -s \
              -H "Authorization: Bearer ${RESEND_API_KEY}" \
              "https://api.resend.com/audiences/${SEGMENT_ID}/contacts")

            EMAILS=$(printf '%s' "$CONTACTS_JSON" \
              | jq -r '.data[] | select(.unsubscribed == false) | .email' 2>/dev/null || true)

            if [ -z "$EMAILS" ]; then
              echo "No subscribers for lang=$LANG, skipping."
              continue
            fi

            # ── send one email per subscriber ─────────────────────────────────

            for EMAIL in $EMAILS; do
              TOKEN=$(make_unsub_token "$EMAIL" "$LANG")
              UNSUB_URL="${WORKER_BASE_URL%/}/unsubscribe?token=$(printf '%s' "$TOKEN" | python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read().strip()))')"

              HTML=$(cat <<HTMLBODY
<!DOCTYPE html>
<html>
<body style="font-family:monospace;max-width:560px;margin:40px auto;color:#23282e;background:#f6f8fa;padding:32px;line-height:1.5">
  <p style="margin-bottom:24px">
    <a href="${SITE_BASE_URL}" style="color:#0553b3;text-decoration:none">Matteo Petrani</a>
  </p>
  <h2 style="font-weight:400;font-size:1.2em;margin:0 0 12px 0">${TITLE_ESC}</h2>
  $([ -n "$EXCERPT_ESC" ] && printf '<p style="color:#57606b;margin:0 0 24px 0">%s</p>' "$EXCERPT_ESC")
  <p style="margin:0 0 32px 0">
    <a href="${POST_URL}" style="color:#0553b3">${READ_LABEL} →</a>
  </p>
  <p style="font-size:0.75em;color:#717a84;border-top:1px solid #eaeef2;padding-top:16px;margin:0">
    <a href="${UNSUB_URL}" style="color:#717a84">${UNSUB_LABEL}</a>
  </p>
</body>
</html>
HTMLBODY
)

              PAYLOAD=$(jq -n \
                --arg from "Matteo Petrani <newsletter@matteopetrani.com>" \
                --arg to "$EMAIL" \
                --arg subject "$TITLE" \
                --arg html "$HTML" \
                --arg unsub "$UNSUB_URL" \
                '{
                  from: $from,
                  to: [$to],
                  subject: $subject,
                  html: $html,
                  headers: { "List-Unsubscribe": ("<" + $unsub + ">") }
                }')

              RESULT=$(curl -s -X POST "https://api.resend.com/emails" \
                -H "Authorization: Bearer ${RESEND_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")

              echo "  → $EMAIL: $(printf '%s' "$RESULT" | jq -r '.id // .message // "error"')"
            done
          done
