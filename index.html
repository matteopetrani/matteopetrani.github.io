<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    (function() {
      var lang = navigator.language || navigator.userLanguage;
      var qs = window.location.search;
      if (lang.startsWith('it')) {
        window.location.href = '/it/' + qs;
      } else {
        window.location.href = '/en/' + qs;
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
